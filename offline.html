<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Offline - Grats UAE Gratuity Calculator</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #fff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --accent: #0071e3;
            --card: #f5f5f7;
            --border: rgba(0, 0, 0, .08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000;
                --text: #f5f5f7;
                --muted: #a1a1a6;
                --card: #1c1c1e;
                --border: rgba(255, 255, 255, .1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        .offline-wrap {
            max-width: 420px;
            width: 100%;
        }

        .offline-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 1.75rem;
            border-radius: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offline-icon svg {
            width: 44px;
            height: 44px;
            stroke: var(--accent);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -.02em;
            margin-bottom: .75rem;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .85rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            font-family: inherit;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 980px;
            cursor: pointer;
            transition: transform .15s ease, opacity .15s ease;
            min-height: 48px;
        }

        .retry-btn:hover {
            opacity: .92;
            transform: translateY(-1px);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .offline-note {
            margin-top: 1.5rem;
            font-size: .8125rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <main class="offline-wrap">
        <div class="offline-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 1l22 22" />
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
                <line x1="12" y1="20" x2="12.01" y2="20" />
            </svg>
        </div>
        <h1>You're offline</h1>
        <p>It looks like you've lost your internet connection. Grats works offline once loaded — reconnect to refresh
            live exchange rates.</p>
        <button class="retry-btn" type="button" onclick="window.location.reload()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M23 4v6h-6" />
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
            </svg>
            Try Again
        </button>
        <p class="offline-note">Grats by Ramon Logan Jr. — UAE Gratuity Calculator</p>
    </main>
    <script>
        // Auto-recover the moment connectivity returns.
        window.addEventListener('online', function () { window.location.reload(); });
    </script>
</body>

</html>
